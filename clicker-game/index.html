<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple incremental clicker game. Every click counts—watch your score rise and unlock upgrades!">
    <meta name="keywords" content="HellenicDev, programming, HTML, CSS, JS, open-source, projects, web-development, clicker game, arcade, educational">
    <meta name="author" content="HellenicDev">
    <meta name="theme-color" content="#19336e">
    <title>Clicker Simulation Game</title>
    
    <!-- Google Analytics -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9FWQFZME3Z');
    </script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #19336e, #1e2a6f);
            color: #fff;
            text-align: center;
        }

        #counter {
            font-size: 3rem;
            margin-bottom: 50px;
        }

        button {
            font-size: 1.25rem;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.3s ease;
        }

        button.enabled {
            background-color: #4CAF50;
            color: white;
        }

        button.disabled {
            background-color: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        #clickButton {
            font-size: 2rem;
            background-color: #ff9800;
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            margin-bottom: 50px;
        }

        #upgrades {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 250px;
        }

        @media (max-width: 500px) {
            #clickButton {
                width: 80%;
            }

            #upgrades {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div id="counter">Points: 0</div>
    <button id="clickButton">Click me!</button>

    <div id="upgrades">
        <button id="doublePointsButton" class="disabled" onclick="purchaseUpgrade('doublePoints')">Double Points (30)</button>
        <button id="autoClickerButton" class="disabled" onclick="purchaseUpgrade('autoClicker')">Auto-Clicker (80)</button>
        <button id="triplePointsButton" class="disabled" onclick="purchaseUpgrade('triplePoints')">Triple Points (100)</button>
        <button id="bonusMultiplierButton" class="disabled" onclick="purchaseUpgrade('bonusMultiplier')">Bonus Multiplier (200)</button>
        <button id="instantClickButton" class="disabled" onclick="purchaseUpgrade('instantClick')">Instant Click (400)</button>
    </div>

    <script>
        let points = 0;
        let clickValue = 1;
        let autoClickActive = false;
        let instantClickActive = false;
        let autoClickInterval = null;
        let instantClickInterval = null;

        const upgrades = {
            doublePoints: { cost: 30, purchased: false, effect: () => clickValue *= 2 },
            triplePoints: { cost: 100, purchased: false, effect: () => clickValue *= 3 },
            bonusMultiplier: { cost: 200, purchased: false, effect: () => clickValue *= 3 },
            autoClicker: { cost: 80, purchased: false, effect: () => startAutoClicker() },
            instantClick: { cost: 400, purchased: false, effect: () => startInstantClick() },
        };

        const counterDiv = document.getElementById('counter');
        const clickButton = document.getElementById('clickButton');

        function updateCounter() {
            counterDiv.textContent = `Points: ${points}`;
            checkUpgrades();
        }

        clickButton.addEventListener('click', () => {
            points += clickValue;
            updateCounter();
        });

        function purchaseUpgrade(name) {
            const upgrade = upgrades[name];
            if (!upgrade.purchased && points >= upgrade.cost) {
                points -= upgrade.cost;
                upgrade.purchased = true;
                upgrade.effect();
                document.getElementById(name + 'Button').classList.add('disabled');
                document.getElementById(name + 'Button').classList.remove('enabled');
                updateCounter();
            }
        }

        function checkUpgrades() {
            for (const [name, upgrade] of Object.entries(upgrades)) {
                const button = document.getElementById(name + 'Button');
                if (!upgrade.purchased && points >= upgrade.cost) {
                    button.classList.add('enabled');
                    button.classList.remove('disabled');
                } else {
                    button.classList.add('disabled');
                    button.classList.remove('enabled');
                }
            }
        }

        function startAutoClicker() {
            if (!autoClickActive) {
                autoClickActive = true;
                autoClickInterval = setInterval(() => {
                    points += clickValue;
                    updateCounter();
                }, 1000);
            }
        }

        function startInstantClick() {
            if (!instantClickActive) {
                instantClickActive = true;
                instantClickInterval = setInterval(() => {
                    points += clickValue;
                    updateCounter();
                }, 200);
            }
        }

        updateCounter();
    </script>
</body>
</html>
