<!DOCTYPE html>
<head>
<meta name="description" content="A currency converter with all major currencies."/>
<meta name="keywords" content="HellenicDev, programming, HTML, CSS, JS, open-source, projects, web-developement, hellenic, dev, developer, currency, application, converter, tool, tools, finance, economics, economy, Currency Converter"/>

<meta name="theme-color" content="#19336e"/>
<html lang="en">
<meta property="og:title" content="HellenicDev">
<meta property="og:description" content="Programming projects, experiments, and tools by HellenicDev.">

<meta property="og:url" content="https://hellenicdev.github.io">

  <meta charset="UTF-8">
  <title>Currency Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<a href="/">
  <img src="https://hellenicdev.github.io/logo.webp" alt="Logo" class="site-logo">
</a>

<div class="container">
  <h1>Currency Converter</h1>

  <input id="amount" type="number" step="0.01" placeholder="Amount">

  <div class="row">
    <div class="flag flag-{{ from_flag }}" id="fromFlag">
      <select id="from">
        {% for c,n in currencies %}
          <option value="{{ c }}" {% if c==from_currency %}selected{% endif %}>
            {{ c }}
          </option>
        {% endfor %}
      </select>
    </div>

    <button id="swap">⇄</button>

    <div class="flag flag-{{ to_flag }}" id="toFlag">
      <select id="to">
        {% for c,n in currencies %}
          <option value="{{ c }}" {% if c==to_currency %}selected{% endif %}>
            {{ c }}
          </option>
        {% endfor %}
      </select>
    </div>
  </div>

  <button id="convert">Convert</button>

  <div id="rate"></div>
  <div id="result"></div>

  <footer>© HellenicDev</footer>
</div>
</style>
<style>.site-logo {
  position: fixed;   /* stays visible at all times */
  top: 10px;
  left: 10px;
  width: 60px;       /* adjust size */
  height: auto;
  z-index: 9999;     /* stays above everything */
}</style>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
