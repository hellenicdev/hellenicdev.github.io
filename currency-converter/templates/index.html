<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A currency converter with all major currencies."/>
  <meta name="keywords" content="HellenicDev, programming, HTML, CSS, JS, open-source, projects, web-developement, hellenic, dev, developer, currency, application, converter, tool, tools, finance, economics, economy, Currency Converter"/>
  <meta name="author" content="HellenicDev"/>
  <meta name="theme-color" content="#19336e"/>
  <meta property="og:title" content="HellenicDev">
  <meta property="og:description" content="Programming projects, experiments, and tools by HellenicDev.">
  <meta property="og:image" content="https://hellenicdev.github.io/logo.webp">
  <meta property="og:url" content="https://hellenicdev.github.io">
  <meta property="og:type" content="website">
  <title>Currency Converter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    (function() {
      var prefs = JSON.parse(localStorage.getItem("preferences")) || { theme: "light" };
      document.documentElement.setAttribute("data-theme", prefs.theme);
    })();
  </script>
</head>
<body>

  <header class="app-header">
    <a href="/" class="logo-link" aria-label="Back to homepage">
      <img src="https://hellenicdev.github.io/logo.webp" alt="HellenicDev Logo" class="site-logo">
    </a>
    <h1 class="app-title">Currency Converter</h1>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span class="icon-light">☀️</span>
      <span class="icon-dark">🌙</span>
    </button>
  </header>

  <main class="converter-layout">
    <div class="card">
      <div class="card-body">
        <label class="input-label" for="amount">Amount</label>
        <input id="amount" type="number" step="0.01" placeholder="Enter amount" autofocus>

        <div class="currency-row">
          <div class="currency-col">
            <label class="input-label" for="from">From</label>
            <div class="flag flag-{{ from_flag }}" id="fromFlag">
              <select id="from">
                {% for c,n in currencies %}
                  <option value="{{ c }}" {% if c==from_currency %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <button class="swap-btn" id="swap" aria-label="Swap currencies">⇄</button>

          <div class="currency-col">
            <label class="input-label" for="to">To</label>
            <div class="flag flag-{{ to_flag }}" id="toFlag">
              <select id="to">
                {% for c,n in currencies %}
                  <option value="{{ c }}" {% if c==to_currency %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </div>

        <button class="convert-btn" id="convert">
          <span class="btn-text">Convert</span>
          <span class="btn-spinner" id="convertSpinner"></span>
        </button>

        <div class="result-area" id="resultArea">
          <div class="result-value" id="result"></div>
          <div class="result-rate" id="rate"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <p>&copy; 2025-2026 HellenicDev — All projects and content belong to HellenicDev.</p>
  </footer>

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9FWQFZME3Z');
  </script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
