<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="An AI-powered assistant. It has games, jokes, riddles, and more."/>
  <meta name="keywords" content="HellenicDev, programming, HTML, CSS, JS, open-source, projects, web-developement, hellenic, dev, developer, AI, Artificial, Intelligence, assistant, Codriver"/>
  <meta name="author" content="HellenicDev"/>
  <meta name="theme-color" content="#19336e"/>
  <title>Codriver - Your AI-powered Assistant</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var prefs = JSON.parse(localStorage.getItem("preferences")) || { theme: "light" };
      document.documentElement.setAttribute("data-theme", prefs.theme);
    })();
  </script>
</head>
<body>

  <header class="app-header">
    <a href="/" class="logo-link" aria-label="Back to homepage">
      <img src="https://hellenicdev.github.io/logo.webp" alt="HellenicDev Logo" class="site-logo">
    </a>
    <h1 class="app-title">Codriver</h1>
    <span class="app-subtitle">Your AI-powered assistant</span>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span class="icon-light">☀️</span>
      <span class="icon-dark">🌙</span>
    </button>
  </header>

  <main class="chat-layout">
    <div class="mic-status" id="micStatus">Listening...</div>

    <div class="chat-container">
      <div class="message-area" id="messageArea">
        <div class="welcome-message">
          <div class="welcome-avatar">🤖</div>
          <p>Hi! I'm Codriver. Ask me anything — try <strong>"joke"</strong>, <strong>"weather Athens"</strong>, <strong>"news"</strong>, or <strong>"game"</strong>!</p>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>

      <div class="suggestions" id="suggestions">
        <button class="chip" data-command="joke">😂 Joke</button>
        <button class="chip" data-command="quote">💬 Quote</button>
        <button class="chip" data-command="fun fact">🧠 Fun Fact</button>
        <button class="chip" data-command="riddle">🤔 Riddle</button>
        <button class="chip" data-command="time">⏰ Time</button>
        <button class="chip" data-command="news">📰 News</button>
        <button class="chip" data-command="game">🎮 Game</button>
        <button class="chip" data-command="weather London">🌤️ Weather</button>
      </div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autofocus />
        <button class="btn btn-primary" id="sendBtn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
        <button class="btn btn-mic" id="micBtn" aria-label="Start voice input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <p>&copy; 2025-2026 HellenicDev — All projects and content belong to HellenicDev.</p>
  </footer>

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9FWQFZME3Z');
  </script>
  <script src="script.js"></script>
</body>
</html>
